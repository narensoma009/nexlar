services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexlara-postgres
    environment:
      POSTGRES_USER: nexlara
      POSTGRES_PASSWORD: nexlara
      POSTGRES_DB: nexlara
    ports:
      - "5432:5432"
    volumes:
      - nexlara-pg:/var/lib/postgresql/data

volumes:
  nexlara-pg:
