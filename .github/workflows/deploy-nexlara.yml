name: Deploy Nexlara

on:
  workflow_dispatch:        # manual trigger only — uncomment `push` below to auto-deploy
  # push:
  #   branches: [main]

env:
  WEB_APP_NAME: nexlara-CHANGE-ME     # must match your Azure Web App name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Fold frontend build into backend/static
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_NEXLARA_PUBLISH_PROFILE }}
          package: ./backend
